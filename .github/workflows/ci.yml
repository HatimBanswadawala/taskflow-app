name: CI

# ════════════════════════════════════════════════════
# TRIGGERS — what events run this workflow
# ════════════════════════════════════════════════════
on:
  push:
    branches: [main]                  # every push to main
  pull_request:
    branches: [main]                  # every PR targeting main
  workflow_dispatch:                  # manual trigger from GitHub UI

# ════════════════════════════════════════════════════
# JOBS
# ════════════════════════════════════════════════════
jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Build .NET solution + run all 13 tests
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore TaskFlow.sln

      - name: Build solution
        run: dotnet build TaskFlow.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test TaskFlow.Tests/TaskFlow.Tests.csproj --configuration Release --no-build --verbosity normal

  # ──────────────────────────────────────────────
  # JOB 2 — Validate Dockerfile builds successfully
  # (Runs only after tests pass — saves CI minutes if tests break)
  # ──────────────────────────────────────────────
  docker-build:
    name: Validate Docker Image Build
    runs-on: ubuntu-latest
    needs: build-and-test               # depends on JOB 1 success
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: TaskFlow.API/Dockerfile
          push: false                    # only validate the build; don't push
          tags: taskflow-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
